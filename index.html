<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BANANEKO CHAT</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#2b2d31,#1e1f22);
height:100vh;
display:flex;
flex-direction:column;
color:white;
}

header{
background:#111214;
padding:15px 20px;
font-size:20px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #2f3136;
}

header span{color:#57f287;}

#chat-box{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.msg{
display:flex;
gap:10px;
animation:fade .2s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

.avatar{
width:42px;
height:42px;
border-radius:50%;
border:2px solid #444;
}

.bubble{
background:#2f3136;
padding:10px 14px;
border-radius:12px;
max-width:70%;
box-shadow:0 2px 5px rgba(0,0,0,0.3);
}

.name{
font-size:12px;
color:#aaa;
margin-bottom:4px;
}

.chat-img{
max-width:220px;
border-radius:8px;
margin-top:5px;
}

.file{
margin-top:5px;
color:#57a6ff;
text-decoration:none;
display:block;
}

#input-area{
background:#1e1f22;
padding:10px;
display:flex;
gap:6px;
align-items:center;
border-top:1px solid #2f3136;
}

#msg-input{
flex:1;
padding:10px;
border-radius:20px;
border:none;
background:#2f3136;
color:white;
}

button{
background:#5865f2;
border:none;
color:white;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
}

.settings{background:#3ba55c;}

#emoji-panel{
position:absolute;
bottom:70px;
left:10px;
background:#2f3136;
padding:10px;
border-radius:10px;
display:none;
max-width:250px;
}

#emoji-panel span{
font-size:22px;
padding:5px;
cursor:pointer;
}

#emoji-panel span:hover{
background:#444;
border-radius:5px;
}

.file-label{
font-size:12px;
color:#aaa;
}

</style>
</head>

<body>

<header>
<div>🍌 <span>BANANEKO CHAT</span></div>
<div>
<button class="settings" onclick="changeName()">名前</button>
<button class="settings" onclick="changeIcon()">アイコン</button>
</div>
</header>

<div id="chat-box"></div>

<div id="emoji-panel"></div>

<div id="input-area">

<button onclick="toggleEmoji()">😀</button>

<input id="msg-input" placeholder="メッセージ">

<div class="file-label">画像</div>
<input type="file" id="img" accept="image/*">

<div class="file-label">ファイル</div>
<input type="file" id="file-input">

<button onclick="sendMessage()">➤</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyBRE5BJBF-fOMJKq3yIq9IQkCFcQUYL900",
authDomain:"my-safe-chat-c814f.firebaseapp.com",
databaseURL:"https://my-safe-chat-c814f-default-rtdb.firebaseio.com",
projectId:"my-safe-chat-c814f",
storageBucket:"my-safe-chat-c814f.appspot.com",
messagingSenderId:"126454688177",
appId:"1:126454688177:web:24b9bba7d71b759f38819"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const chatRef=ref(db,"messages");

const ADMIN="Bananeko345";

let username=localStorage.getItem("chatName");

if(!username){
username=prompt("名前を決めてください");
localStorage.setItem("chatName",username);
}

let icon=localStorage.getItem("chatIcon");

if(!icon){
icon="https://cdn-icons-png.flaticon.com/512/149/149071.png";
localStorage.setItem("chatIcon",icon);
}

window.changeName=()=>{
const n=prompt("新しい名前");
if(n){
username=n;
localStorage.setItem("chatName",n);
}
}

window.changeIcon=()=>{
const url=prompt("アイコンURL");
if(url){
icon=url;
localStorage.setItem("chatIcon",url);
}
}

const emojis=["😀","😂","😎","😍","🥺","😭","👍","🔥","🎉","❤️","😡","🤔","👀","👏"];

const panel=document.getElementById("emoji-panel");

emojis.forEach(e=>{
const span=document.createElement("span");
span.textContent=e;
span.onclick=()=>{
document.getElementById("msg-input").value+=e;
panel.style.display="none";
};
panel.appendChild(span);
});

window.toggleEmoji=()=>{
panel.style.display=panel.style.display==="block"?"none":"block";
}

function readImage(file){
return new Promise((resolve)=>{
const reader=new FileReader();
reader.onload=e=>resolve(e.target.result);
reader.readAsDataURL(file);
});
}

window.sendMessage=async()=>{

const text=document.getElementById("msg-input").value.trim();
const imgFile=document.getElementById("img").files[0];
const file=document.getElementById("file-input").files[0];

if(text==="" && !imgFile && !file) return;

let image=null;
let fileURL=null;
let fileName=null;

if(imgFile){
image=await readImage(imgFile);
}

if(file){
fileURL=URL.createObjectURL(file);
fileName=file.name;
}

push(chatRef,{
name:username,
icon:icon,
text:text,
image:image,
file:fileURL,
fileName:fileName
});

document.getElementById("msg-input").value="";
document.getElementById("img").value="";
document.getElementById("file-input").value="";
}

document.getElementById("msg-input").addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
sendMessage();
}
});

onChildAdded(chatRef,(snapshot)=>{

const data=snapshot.val();
const key=snapshot.key;

const msg=document.createElement("div");
msg.className="msg";

const avatar=document.createElement("img");
avatar.className="avatar";
avatar.src=data.icon;

const bubble=document.createElement("div");
bubble.className="bubble";

const name=document.createElement("div");
name.className="name";
name.textContent=data.name;

bubble.appendChild(name);

if(data.text){
const text=document.createElement("div");
text.textContent=data.text;
bubble.appendChild(text);
}

if(data.image){
const img=document.createElement("img");
img.src=data.image;
img.className="chat-img";
bubble.appendChild(img);
}

if(data.file){
const link=document.createElement("a");
link.href=data.file;
link.download=data.fileName;
link.textContent="📦 "+data.fileName+" をダウンロード";
link.className="file";
bubble.appendChild(link);
}

msg.appendChild(avatar);
msg.appendChild(bubble);

const chatBox=document.getElementById("chat-box");

chatBox.appendChild(msg);
chatBox.scrollTop=chatBox.scrollHeight;

let timer;

msg.addEventListener("touchstart",()=>{

timer=setTimeout(()=>{

if(username===data.name || username===ADMIN){

if(confirm("このメッセージ削除する？")){
remove(ref(db,"messages/"+key));
}

}

},600);

});

msg.addEventListener("touchend",()=>clearTimeout(timer));

msg.oncontextmenu=(e)=>{

e.preventDefault();

if(username===data.name || username===ADMIN){

if(confirm("削除する？")){
remove(ref(db,"messages/"+key));
}

}

};

});

</script>

</body>
</html>
