<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>安全チャット</title>

<style>

body{
font-family:sans-serif;
background:#e5ddd5;
margin:0;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#075e54;
color:white;
padding:15px;
text-align:center;
}

#chat-box{
flex:1;
overflow:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
background:white;
padding:10px 15px;
border-radius:15px;
max-width:80%;
}

.name{
font-size:12px;
color:gray;
margin-bottom:3px;
}

#input-area{
display:flex;
padding:10px;
background:#f0f0f0;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

button{
width:50px;
border:none;
background:#128c7e;
color:white;
border-radius:50%;
font-size:20px;
cursor:pointer;
}

</style>
</head>

<body>

<header>🌎 安全チャット</header>

<div id="chat-box"></div>

<div id="input-area">
<input id="msg-input" placeholder="メッセージ">
<button id="send-btn">➤</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBRE5BJBF-fOMJKq3yIq9IQkCFcQUYL900",
authDomain: "my-safe-chat-c814f.firebaseapp.com",
databaseURL: "https://my-safe-chat-c814f-default-rtdb.firebaseio.com",
projectId: "my-safe-chat-c814f",
storageBucket: "my-safe-chat-c814f.appspot.com",
messagingSenderId: "126454688177",
appId: "1:126454688177:web:24b9bba7d71b759f38819"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const chatRef = ref(db,"messages");


// 名前設定
let username = localStorage.getItem("chatName");

if(!username){
username = prompt("名前を決めてください！");
localStorage.setItem("chatName",username);
}


function sendMessage(){

const input=document.getElementById("msg-input");
const text=input.value.trim();

if(!text)return;

push(chatRef,{
name:username,
text:text
});

input.value="";
}


document.getElementById("send-btn").onclick=sendMessage;

document.getElementById("msg-input").addEventListener("keypress",(e)=>{
if(e.key==="Enter") sendMessage();
});


onChildAdded(chatRef,(snapshot)=>{

const data=snapshot.val();

const div=document.createElement("div");
div.className="msg";

const name=document.createElement("div");
name.className="name";
name.textContent=data.name;

const msg=document.createElement("div");
msg.textContent=data.text;

div.appendChild(name);
div.appendChild(msg);

document.getElementById("chat-box").appendChild(div);

});

</script>

</body>
</html>
