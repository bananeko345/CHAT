<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BANANEKO CHAT</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:system-ui;
background:#0f1115;
color:white;
height:100vh;
overflow:hidden;
transition:0.5s;
}

/* 朝テーマ */

body.day{
background:linear-gradient(#7ed6ff,#dff6ff);
color:black;
}

/* 背景 */

.bg{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
z-index:-1;
}

.circle{
position:absolute;
border-radius:50%;
background:rgba(120,255,180,0.15);
animation:float 18s infinite ease-in-out;
}

.circle:nth-child(1){
width:400px;
height:400px;
left:-120px;
top:120px;
}

.circle:nth-child(2){
width:300px;
height:300px;
right:-80px;
top:200px;
animation-duration:22s;
}

.circle:nth-child(3){
width:500px;
height:500px;
left:30%;
bottom:-250px;
animation-duration:26s;
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-100px)}
100%{transform:translateY(0px)}
}

/* お知らせパネル */

#noticePanel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.noticeBox{
background:#1e2230;
padding:35px;
border-radius:16px;
text-align:center;
width:320px;
animation:pop .4s;
}

@keyframes pop{
0%{transform:scale(.8);opacity:0}
100%{transform:scale(1);opacity:1}
}

/* ホーム */

#home{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.start-btn{
font-size:22px;
padding:18px 50px;
background:#5865f2;
border:none;
border-radius:14px;
color:white;
cursor:pointer;
transition:0.25s;
}

.start-btn:hover{
transform:scale(1.05);
}

/* 右上設定 */

.top-controls{
position:absolute;
top:15px;
right:15px;
}

.top-controls button{
margin-left:6px;
}

/* チャット */

#chat{
display:none;
flex-direction:column;
height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:#111214;
border-bottom:1px solid #2a2f3a;
}

.logo{
font-size:18px;
font-weight:bold;
color:#57f287;
}

button{
background:#5865f2;
border:none;
color:white;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

#chat-box{
flex:1;
overflow:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:12px;
}

.msg{
display:flex;
gap:10px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
}

.bubble{
background:#1e2230;
padding:10px;
border-radius:10px;
max-width:70%;
}

.name{
font-size:12px;
color:#aaa;
margin-bottom:3px;
}

.file{
color:#57a6ff;
display:block;
margin-top:5px;
}

/* お知らせメッセージ */

.notice-msg{
color:#57f287;
font-weight:bold;
}

#input-area{
display:flex;
gap:6px;
padding:10px;
background:#111214;
}

#msg-input{
flex:1;
padding:10px;
border-radius:20px;
border:none;
background:#1e2230;
color:white;
}

</style>
</head>
<body>

<div class="bg">
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>
</div>

<!-- お知らせパネル -->

<div id="noticePanel">
<div class="noticeBox">
<h2>📢 お知らせ</h2>
<br>
2026/03/10<br>
BANANEKO CHAT 公開！
<br><br>
<button onclick="closeNotice()">OK</button>
</div>
</div>

<!-- HOME -->

<div id="home">

<div class="top-controls">
<button onclick="setTheme('day')">☀️</button>
<button onclick="setTheme('night')">🌙</button>
</div>

<button class="start-btn" onclick="startChat()">チャットを開始する</button>

</div>

<!-- CHAT -->

<div id="chat">

<header>
<div class="logo">🍌 BANANEKO CHAT</div>

<div>
<button onclick="toggleUsers()">👥</button>
<button onclick="changeName()">名前</button>
<button onclick="changeIcon()">アイコン</button>
</div>

</header>

<div id="chat-box"></div>

<div id="user-list" style="display:none;position:fixed;right:10px;top:70px;background:#1e2230;padding:10px;border-radius:10px;">
<h4>オンライン</h4>
<div id="users"></div>
</div>

<div id="input-area">
<input id="msg-input" placeholder="メッセージ">
<input type="file" id="file">
<button id="send-btn">送信</button>
</div>

</div>

<script type="module">

/* お知らせ */

if(localStorage.getItem("notice20260310")){
document.getElementById("noticePanel").style.display="none"
}

window.closeNotice=()=>{
localStorage.setItem("notice20260310","true")
document.getElementById("noticePanel").style.display="none"
}

/* テーマ */

window.setTheme=(mode)=>{
if(mode==="day"){
document.body.classList.add("day")
}else{
document.body.classList.remove("day")
}
}

/* チャット開始 */

window.startChat=()=>{
document.getElementById("home").style.display="none"
const chat=document.getElementById("chat")
chat.style.display="flex"

setTimeout(()=>{scrollBottom()},200)
}

/* Firebase */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, remove, onValue, query, limitToLast, orderByKey } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig={
apiKey:"AIzaSyBRE5BJBF-fOMJKq3yIq9IQkCFcQUYL900",
authDomain:"my-safe-chat-c814f.firebaseapp.com",
databaseURL:"https://my-safe-chat-c814f-default-rtdb.firebaseio.com",
projectId:"my-safe-chat-c814f",
storageBucket:"my-safe-chat-c814f.appspot.com",
messagingSenderId:"126454688177",
appId:"1:126454688177:web:24b9bba7d71b759f38819"
};

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)
const storage=getStorage(app)

/* ユーザー */

let username=localStorage.getItem("chatName")

if(!username){
username=prompt("名前")||"名無し"
localStorage.setItem("chatName",username)
}

let icon=localStorage.getItem("chatIcon")||"https://cdn-icons-png.flaticon.com/512/149/149071.png"

const userRef=ref(db,"onlineUsers/"+username)

set(userRef,true)

push(ref(db,"messages"),{
system:true,
text:username+" さんがいらっしゃいました！"
})

window.addEventListener("beforeunload",()=>{
remove(userRef)

push(ref(db,"messages"),{
system:true,
text:username+" さんが退出しました"
})

})

const chatRef=query(
ref(db,"messages"),
orderByKey(),
limitToLast(120)
)

document.getElementById("send-btn").onclick=sendMessage

document.getElementById("msg-input").addEventListener("keypress",e=>{
if(e.key==="Enter")sendMessage()
})

async function sendMessage(){

const msgInput=document.getElementById("msg-input")
const fileInput=document.getElementById("file")

const text=msgInput.value.trim()
const file=fileInput.files[0]

if(!text&&!file)return

let fileUrl=null
let fileName=null

if(file){

fileName=file.name
const fileRef=sRef(storage,"files/"+Date.now()+"_"+fileName)

await uploadBytes(fileRef,file)
fileUrl=await getDownloadURL(fileRef)

}

push(ref(db,"messages"),{
name:username,
icon:icon,
text:text,
file:fileUrl,
fileName:fileName
})

msgInput.value=""
fileInput.value=""

}

onChildAdded(chatRef,(snap)=>{

const data=snap.val()
const chat=document.getElementById("chat-box")

const msg=document.createElement("div")

if(data.system){

msg.className="notice-msg"
msg.textContent=data.text

chat.appendChild(msg)
scrollBottom()
return

}

msg.className="msg"

const avatar=document.createElement("img")
avatar.src=data.icon
avatar.className="avatar"

const bubble=document.createElement("div")
bubble.className="bubble"

const name=document.createElement("div")
name.className="name"
name.textContent=data.name

bubble.appendChild(name)

if(data.text){

const t=document.createElement("div")
t.textContent=data.text
bubble.appendChild(t)

}

if(data.file){

const link=document.createElement("a")
link.href=data.file
link.textContent=data.fileName
link.className="file"

bubble.appendChild(link)

}

msg.appendChild(avatar)
msg.appendChild(bubble)

chat.appendChild(msg)

scrollBottom()

})

function scrollBottom(){
const chat=document.getElementById("chat-box")
chat.scrollTop=chat.scrollHeight
}

const usersRef=ref(db,"onlineUsers")

onValue(usersRef,(snap)=>{

const users=snap.val()
const box=document.getElementById("users")

box.innerHTML=""

for(let u in users){

const div=document.createElement("div")
div.textContent="🟢 "+u

box.appendChild(div)

}

})

window.toggleUsers=()=>{
const u=document.getElementById("user-list")
u.style.display=u.style.display==="block"?"none":"block"
}

window.changeName=()=>{
const n=prompt("名前")
if(n){
localStorage.setItem("chatName",n)
location.reload()
}
}

window.changeIcon=()=>{
const url=prompt("アイコンURL")
if(url){
localStorage.setItem("chatIcon",url)
location.reload()
}
}

</script>
</body>
</html>
