<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BANANEKO CHAT</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:system-ui;
background:#0f1115;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:#111214;
border-bottom:1px solid #2a2f3a;
}

.logo{
font-size:18px;
font-weight:bold;
color:#57f287;
}

.menu button{
margin-left:6px;
}

button{
background:#5865f2;
border:none;
color:white;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

#chat-box{
flex:1;
overflow:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:12px;
}

.msg{
display:flex;
gap:10px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
}

.bubble{
background:#1e2230;
padding:10px;
border-radius:10px;
max-width:70%;
}

.name{
font-size:12px;
color:#aaa;
margin-bottom:3px;
}

.chat-img{
max-width:200px;
border-radius:8px;
margin-top:5px;
}

.file{
color:#57a6ff;
display:block;
margin-top:5px;
}

.system{
color:#57f287;
font-size:13px;
}

#input-area{
display:flex;
gap:6px;
padding:10px;
background:#111214;
}

#msg-input{
flex:1;
padding:10px;
border-radius:20px;
border:none;
background:#1e2230;
color:white;
}

#emoji-panel{
position:fixed;
bottom:80px;
left:10px;
background:#1e2230;
padding:10px;
border-radius:10px;
display:none;
}

#emoji-panel span{
font-size:22px;
cursor:pointer;
padding:3px;
}

#user-list{
position:fixed;
right:10px;
top:70px;
background:#1e2230;
padding:10px;
border-radius:10px;
display:none;
}
</style>
</head>

<body>

<header>
<div class="logo">🍌 BANANEKO CHAT</div>

<div class="menu">
<button onclick="toggleUsers()">👥</button>
<button onclick="changeName()">名前</button>
<button onclick="changeIcon()">アイコン</button>
</div>
</header>

<div id="chat-box"></div>

<div id="user-list">
<h4>オンライン</h4>
<div id="users"></div>
</div>

<div id="emoji-panel"></div>

<div id="input-area">
<button onclick="toggleEmoji()">😀</button>
<input id="msg-input" placeholder="メッセージ">
<input type="file" id="file">
<button id="send-btn">送信</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push,
onChildAdded,
set,
remove,
onValue,
query,
limitToLast,
orderByKey
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
getStorage,
ref as sRef,
uploadBytes,
getDownloadURL
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig={
apiKey:"AIzaSyBRE5BJBF-fOMJKq3yIq9IQkCFcQUYL900",
authDomain:"my-safe-chat-c814f.firebaseapp.com",
databaseURL:"https://my-safe-chat-c814f-default-rtdb.firebaseio.com",
projectId:"my-safe-chat-c814f",
storageBucket:"my-safe-chat-c814f.appspot.com",
messagingSenderId:"126454688177",
appId:"1:126454688177:web:24b9bba7d71b759f38819"
};

const app=initializeApp(firebaseConfig);

const db=getDatabase(app);
const storage=getStorage(app);

let username=localStorage.getItem("chatName");

if(!username){
username=prompt("名前を決めてください") || "名無し";
localStorage.setItem("chatName",username);
}

let icon=localStorage.getItem("chatIcon") || "https://cdn-icons-png.flaticon.com/512/149/149071.png";

const userRef=ref(db,"onlineUsers/"+username);

set(userRef,true);

window.addEventListener("beforeunload",()=>{
remove(userRef);
});

const chatRef=query(
ref(db,"messages"),
orderByKey(),
limitToLast(120)
);

function readFile(file){
return new Promise(r=>{
const reader=new FileReader();
reader.onload=e=>r(e.target.result);
reader.readAsDataURL(file);
});
}

async function sendMessage(){

const msgInput=document.getElementById("msg-input");
const fileInput=document.getElementById("file");

const text=msgInput.value.trim();
const file=fileInput.files[0];

if(!text && !file)return;

let fileUrl=null;
let fileName=null;

if(file){

fileName=file.name;

const fileRef=sRef(storage,"files/"+Date.now()+"_"+fileName);

await uploadBytes(fileRef,file);

fileUrl=await getDownloadURL(fileRef);

}

push(ref(db,"messages"),{

name:username,
icon:icon,
text:text,
file:fileUrl,
fileName:fileName

});

msgInput.value="";
fileInput.value="";
}

document.getElementById("send-btn").onclick=sendMessage;

document.getElementById("msg-input").addEventListener("keypress",e=>{
if(e.key==="Enter")sendMessage();
});

onChildAdded(chatRef,(snap)=>{

const data=snap.val();

const chat=document.getElementById("chat-box");

if(data.system){

const div=document.createElement("div");

div.className="system";
div.textContent=data.text;

chat.appendChild(div);

return;

}

const msg=document.createElement("div");
msg.className="msg";

const avatar=document.createElement("img");
avatar.src=data.icon;
avatar.className="avatar";

const bubble=document.createElement("div");
bubble.className="bubble";

const name=document.createElement("div");
name.className="name";
name.textContent=data.name;

bubble.appendChild(name);

if(data.text){

const t=document.createElement("div");
t.textContent=data.text;

bubble.appendChild(t);

}

if(data.file){

if(data.fileName.match(/\.(png|jpg|jpeg|gif|webp)$/i)){

const img=document.createElement("img");

img.src=data.file;
img.className="chat-img";

bubble.appendChild(img);

}else{

const link=document.createElement("a");

link.href=data.file;
link.download=data.fileName;
link.textContent="⬇ "+data.fileName;
link.className="file";

bubble.appendChild(link);

}

}

msg.appendChild(avatar);
msg.appendChild(bubble);

chat.appendChild(msg);

chat.scrollTop=chat.scrollHeight;

});

const emojis="😀😆😂🤣😊😍😎😭👍🔥🎉🍌❤️".split("");

const panel=document.getElementById("emoji-panel");

emojis.forEach(e=>{

const span=document.createElement("span");

span.textContent=e;

span.onclick=()=>{

document.getElementById("msg-input").value+=e;

};

panel.appendChild(span);

});

window.toggleEmoji=()=>{

panel.style.display=
panel.style.display==="block"?"none":"block";

};

window.toggleUsers=()=>{

const u=document.getElementById("user-list");

u.style.display=
u.style.display==="block"?"none":"block";

};

window.changeName=()=>{

const n=prompt("新しい名前");

if(n){

localStorage.setItem("chatName",n);

location.reload();

}

};

window.changeIcon=async()=>{

const mode=prompt("1:URL\n2:画像");

if(mode==="1"){

const url=prompt("URL");

if(url){

icon=url;

localStorage.setItem("chatIcon",url);

}

}

if(mode==="2"){

const input=document.createElement("input");

input.type="file";
input.accept="image/*";

input.onchange=async()=>{

const file=input.files[0];

const data=await readFile(file);

icon=data;

localStorage.setItem("chatIcon",data);

};

input.click();

}

};

const usersRef=ref(db,"onlineUsers");

onValue(usersRef,(snap)=>{

const users=snap.val();

const box=document.getElementById("users");

box.innerHTML="";

for(let u in users){

const div=document.createElement("div");

div.textContent="🟢 "+u;

box.appendChild(div);

}

});

</script>

</body>
</html>
