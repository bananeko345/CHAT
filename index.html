<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BANANEKO CHAT</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:sans-serif;
background:#1e1f22;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:#111214;
border-bottom:1px solid #2f3136;
}

.logo{
font-size:20px;
font-weight:bold;
color:#57f287;
}

.menu{
display:flex;
gap:10px;
}

button{
background:#5865f2;
border:none;
color:white;
padding:6px 12px;
border-radius:8px;
cursor:pointer;
}

#chat-box{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;
}

.msg{
display:flex;
gap:10px;
}

.avatar{
width:42px;
height:42px;
border-radius:50%;
}

.bubble{
background:#2f3136;
padding:10px 14px;
border-radius:10px;
max-width:70%;
}

.name{
font-size:12px;
color:#aaa;
margin-bottom:4px;
}

.chat-img{
max-width:220px;
border-radius:8px;
margin-top:6px;
}

.file{
display:block;
margin-top:6px;
color:#57a6ff;
}

#input-area{
display:flex;
gap:6px;
padding:10px;
background:#111214;
border-top:1px solid #2f3136;
}

#msg-input{
flex:1;
padding:10px;
border:none;
border-radius:20px;
background:#2f3136;
color:white;
}

.file-label{
font-size:11px;
color:#aaa;
}

#emoji-panel{
position:absolute;
bottom:70px;
left:10px;
background:#2f3136;
padding:10px;
border-radius:10px;
display:none;
}

#emoji-panel span{
font-size:22px;
padding:4px;
cursor:pointer;
}

#user-list{
position:fixed;
top:60px;
right:10px;
background:#2f3136;
padding:15px;
border-radius:10px;
display:none;
max-width:200px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

#user-list h3{
margin-top:0;
font-size:14px;
color:#57f287;
}

</style>
</head>

<body>

<header>

<div class="logo">🍌 BANANEKO CHAT</div>

<div class="menu">
<button onclick="showUsers()">👥</button>
<button onclick="changeName()">名前</button>
<button onclick="changeIcon()">アイコン</button>
</div>

</header>

<div id="chat-box"></div>

<div id="user-list">
<h3>参加ユーザー</h3>
<div id="users"></div>
</div>

<div id="emoji-panel"></div>

<div id="input-area">

<button onclick="toggleEmoji()">😀</button>

<input id="msg-input" placeholder="メッセージ">

<div class="file-label">画像</div>
<input type="file" id="img" accept="image/*">

<div class="file-label">ファイル</div>
<input type="file" id="file-input">

<button onclick="sendMessage()">送信</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyBRE5BJBF-fOMJKq3yIq9IQkCFcQUYL900",
authDomain:"my-safe-chat-c814f.firebaseapp.com",
databaseURL:"https://my-safe-chat-c814f-default-rtdb.firebaseio.com",
projectId:"my-safe-chat-c814f",
storageBucket:"my-safe-chat-c814f.appspot.com",
messagingSenderId:"126454688177",
appId:"1:126454688177:web:24b9bba7d71b759f38819"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const chatRef=ref(db,"messages");

const ADMIN="Bananeko345";

let userSet=new Set();

let username=localStorage.getItem("chatName");

if(!username){
username=prompt("名前を決めてください");
localStorage.setItem("chatName",username);
}

let icon=localStorage.getItem("chatIcon");

if(!icon){
icon="https://cdn-icons-png.flaticon.com/512/149/149071.png";
localStorage.setItem("chatIcon",icon);
}

window.changeName=()=>{
const n=prompt("新しい名前");
if(n){
username=n;
localStorage.setItem("chatName",n);
}
}

window.changeIcon=()=>{

const type=prompt("1:URL  2:端末画像");

if(type==="1"){

const url=prompt("画像URL");

if(url){
icon=url;
localStorage.setItem("chatIcon",url);
}

}

if(type==="2"){

const input=document.createElement("input");
input.type="file";
input.accept="image/*";

input.onchange=()=>{

const file=input.files[0];
const reader=new FileReader();

reader.onload=e=>{
icon=e.target.result;
localStorage.setItem("chatIcon",icon);
};

reader.readAsDataURL(file);

};

input.click();

}

}

const emojis=["😀","😂","😎","😍","🥺","😭","👍","🔥","🎉","❤️"];

const panel=document.getElementById("emoji-panel");

emojis.forEach(e=>{

const span=document.createElement("span");
span.textContent=e;

span.onclick=()=>{
document.getElementById("msg-input").value+=e;
panel.style.display="none";
};

panel.appendChild(span);

});

window.toggleEmoji=()=>{
panel.style.display=
panel.style.display==="block"?"none":"block";
}

function readImage(file){

return new Promise(resolve=>{

const reader=new FileReader();
reader.onload=e=>resolve(e.target.result);
reader.readAsDataURL(file);

});

}

window.sendMessage=async()=>{

const text=document.getElementById("msg-input").value.trim();
const imgFile=document.getElementById("img").files[0];
const file=document.getElementById("file-input").files[0];

if(text==="" && !imgFile && !file) return;

let image=null;
let fileURL=null;
let fileName=null;

if(imgFile){
image=await readImage(imgFile);
}

if(file){
fileURL=URL.createObjectURL(file);
fileName=file.name;
}

push(chatRef,{
name:username,
icon:icon,
text:text,
image:image,
file:fileURL,
fileName:fileName
});

document.getElementById("msg-input").value="";
document.getElementById("img").value="";
document.getElementById("file-input").value="";

}

document.getElementById("msg-input").addEventListener("keydown",e=>{
if(e.key==="Enter") sendMessage();
});

onChildAdded(chatRef,(snapshot)=>{

const data=snapshot.val();
const key=snapshot.key;

userSet.add(data.name);
updateUserList();

const msg=document.createElement("div");
msg.className="msg";

const avatar=document.createElement("img");
avatar.className="avatar";
avatar.src=data.icon;

const bubble=document.createElement("div");
bubble.className="bubble";

const name=document.createElement("div");
name.className="name";
name.textContent=data.name;

bubble.appendChild(name);

if(data.text){

const text=document.createElement("div");
text.textContent=data.text;
bubble.appendChild(text);

}

if(data.image){

const img=document.createElement("img");
img.src=data.image;
img.className="chat-img";
bubble.appendChild(img);

}

if(data.file){

const link=document.createElement("a");
link.href=data.file;
link.download=data.fileName;
link.textContent="📦 "+data.fileName;
link.className="file";
bubble.appendChild(link);

}

msg.appendChild(avatar);
msg.appendChild(bubble);

const chatBox=document.getElementById("chat-box");

chatBox.appendChild(msg);

chatBox.scrollTop=chatBox.scrollHeight;

msg.oncontextmenu=e=>{

e.preventDefault();

if(username===data.name || username===ADMIN){

if(confirm("削除する？")){
remove(ref(db,"messages/"+key));
}

}

};

});

function updateUserList(){

const box=document.getElementById("users");
box.innerHTML="";

userSet.forEach(u=>{

const div=document.createElement("div");
div.textContent="👤 "+u;
box.appendChild(div);

});

}

window.showUsers=()=>{

const list=document.getElementById("user-list");

list.style.display=
list.style.display==="block"?"none":"block";

}

</script>

</body>
</html>
