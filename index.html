<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BANANEKO CHAT</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:sans-serif;
background:#1e1f22;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:#111214;
border-bottom:1px solid #2f3136;
flex-wrap:wrap;
gap:6px;
}

.logo{
font-size:18px;
font-weight:bold;
color:#57f287;
}

.menu{
display:flex;
gap:6px;
flex-wrap:wrap;
}

button{
background:#5865f2;
border:none;
color:white;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

#chat-box{
flex:1;
overflow:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:12px;
}

.msg{
display:flex;
gap:10px;
align-items:flex-start;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;
}

.bubble{
background:#2f3136;
padding:10px;
border-radius:10px;
max-width:75%;
}

.name{
font-size:12px;
color:#aaa;
margin-bottom:4px;
}

.system{
color:#57f287;
font-size:13px;
}

.chat-img{
max-width:200px;
border-radius:8px;
margin-top:6px;
}

.file{
display:block;
margin-top:6px;
color:#57a6ff;
}

#input-area{
display:flex;
gap:6px;
padding:10px;
background:#111214;
border-top:1px solid #2f3136;
flex-wrap:wrap;
}

#msg-input{
flex:1;
padding:10px;
border:none;
border-radius:20px;
background:#2f3136;
color:white;
min-width:120px;
}

.file-label{
font-size:11px;
color:#aaa;
}

#emoji-panel{
position:absolute;
bottom:70px;
left:10px;
background:#2f3136;
padding:10px;
border-radius:10px;
display:none;
}

#emoji-panel span{
font-size:22px;
padding:4px;
cursor:pointer;
}

#user-list{
position:fixed;
top:60px;
right:10px;
background:#2f3136;
padding:15px;
border-radius:10px;
display:none;
max-width:200px;
}

#dm-panel{
position:fixed;
top:60px;
left:10px;
background:#2f3136;
padding:15px;
border-radius:10px;
display:none;
max-width:220px;
}

@media (max-width:600px){

.avatar{
width:34px;
height:34px;
}

button{
font-size:12px;
padding:6px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">🍌 BANANEKO CHAT</div>

<div class="menu">
<button onclick="toggleDM()">💬DM</button>
<button onclick="showUsers()">👥</button>
<button onclick="changeName()">名前</button>
<button onclick="changeIcon()">アイコン</button>
</div>

</header>

<div id="chat-box"></div>

<div id="user-list">
<h3>オンライン</h3>
<div id="users"></div>
</div>

<div id="dm-panel">
<h3>DM</h3>
<div id="dm-list"></div>
</div>

<div id="emoji-panel"></div>

<div id="input-area">

<button onclick="toggleEmoji()">😀</button>

<input id="msg-input" placeholder="メッセージ">

<div class="file-label">画像</div>
<input type="file" id="img" accept="image/*">

<div class="file-label">ファイル</div>
<input type="file" id="file-input">

<button onclick="sendMessage()">送信</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, remove, onValue, get, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyBRE5BJBF-fOMJKq3yIq9IQkCFcQUYL900",
authDomain:"my-safe-chat-c814f.firebaseapp.com",
databaseURL:"https://my-safe-chat-c814f-default-rtdb.firebaseio.com",
projectId:"my-safe-chat-c814f",
storageBucket:"my-safe-chat-c814f.appspot.com",
messagingSenderId:"126454688177",
appId:"1:126454688177:web:24b9bba7d71b759f38819"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const ADMIN="Bananeko345";

let username=localStorage.getItem("chatName");

if(!username){
username=prompt("名前を決めてください");
localStorage.setItem("chatName",username);
}

let icon=localStorage.getItem("chatIcon");

if(!icon){
icon="https://cdn-icons-png.flaticon.com/512/149/149071.png";
localStorage.setItem("chatIcon",icon);
}

const banCheck=await get(ref(db,"bans/"+username));

if(banCheck.exists()){
alert("あなたはBANされています");
document.body.innerHTML="<h1 style='color:white;text-align:center;margin-top:40vh;'>BANされています</h1>";
throw new Error("banned");
}

const chatRef=query(ref(db,"messages"),limitToLast(50));
const usersRef=ref(db,"onlineUsers");

const userRef=ref(db,"onlineUsers/"+username);

set(userRef,true);

push(ref(db,"messages"),{
system:true,
text:username+" さんいらっしゃい！"
});

window.addEventListener("beforeunload",()=>{

remove(userRef);

push(ref(db,"messages"),{
system:true,
text:username+" さんが退出しました"
});

});

window.changeName=()=>{
const n=prompt("新しい名前");
if(n){
remove(userRef);
localStorage.setItem("chatName",n);
location.reload();
}
}

window.changeIcon=()=>{
const url=prompt("アイコンURL");
if(url){
icon=url;
localStorage.setItem("chatIcon",url);
}
}

window.toggleDM=()=>{
const panel=document.getElementById("dm-panel");
panel.style.display=panel.style.display==="block"?"none":"block";
}

window.showUsers=()=>{
const list=document.getElementById("user-list");
list.style.display=list.style.display==="block"?"none":"block";
}

onValue(usersRef,(snap)=>{

const users=snap.val();
const box=document.getElementById("users");

box.innerHTML="";

for(let u in users){

const div=document.createElement("div");
div.textContent="🟢 "+u;

div.onclick=()=>openUserMenu(u);

box.appendChild(div);

}

});

function openUserMenu(user){

if(user===username)return;

let text="";

text+="DMする\n";

if(username===ADMIN){
text+="KICK\nBAN\n";
}

const act=prompt(user+"\n"+text);

if(act==="DMする"){
alert("DMは次のアップデートで動きます");
}

if(act==="BAN" && username===ADMIN){
set(ref(db,"bans/"+user),true);
alert("BANしました");
}

if(act==="KICK" && username===ADMIN){
remove(ref(db,"onlineUsers/"+user));
alert("KICKしました");
}

}

function readImage(file){
return new Promise(resolve=>{
const reader=new FileReader();
reader.onload=e=>resolve(e.target.result);
reader.readAsDataURL(file);
});
}

window.sendMessage=async()=>{

const text=document.getElementById("msg-input").value.trim();
const imgFile=document.getElementById("img").files[0];
const file=document.getElementById("file-input").files[0];

if(text==="" && !imgFile && !file)return;

let image=null;

if(imgFile){
image=await readImage(imgFile);
}

push(ref(db,"messages"),{
name:username,
icon:icon,
text:text,
image:image
});

document.getElementById("msg-input").value="";
document.getElementById("img").value="";
document.getElementById("file-input").value="";
}

onChildAdded(chatRef,(snapshot)=>{

const data=snapshot.val();

const chatBox=document.getElementById("chat-box");

if(data.system){

const div=document.createElement("div");
div.className="system";
div.textContent=data.text;
chatBox.appendChild(div);
return;

}

const msg=document.createElement("div");
msg.className="msg";

const avatar=document.createElement("img");
avatar.className="avatar";
avatar.src=data.icon;

avatar.onclick=()=>{
openUserMenu(data.name);
};

const bubble=document.createElement("div");
bubble.className="bubble";

const name=document.createElement("div");
name.className="name";
name.textContent=data.name;

bubble.appendChild(name);

if(data.text){
const text=document.createElement("div");
text.textContent=data.text;
bubble.appendChild(text);
}

if(data.image){
const img=document.createElement("img");
img.src=data.image;
img.className="chat-img";
bubble.appendChild(img);
}

msg.appendChild(avatar);
msg.appendChild(bubble);

chatBox.appendChild(msg);

chatBox.scrollTop=chatBox.scrollHeight;

});

</script>

</body>
</html>
