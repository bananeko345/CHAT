<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BANANEKO CHAT</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:system-ui;
background:#0f1115;
color:white;
height:100vh;
overflow:hidden;
transition:0.5s;
}

/* 朝テーマ */
body.day{
background:linear-gradient(#7ed6ff,#dff6ff);
color:black;
}

/* 背景 */

.bg{
position:fixed;
width:100%;
height:100%;
overflow:hidden;
z-index:-1;
}

.circle{
position:absolute;
border-radius:50%;
background:rgba(120,255,180,0.15);
animation:float 18s infinite ease-in-out;
}

.circle:nth-child(1){
width:400px;
height:400px;
left:-120px;
top:120px;
}

.circle:nth-child(2){
width:300px;
height:300px;
right:-80px;
top:200px;
animation-duration:22s;
}

.circle:nth-child(3){
width:500px;
height:500px;
left:30%;
bottom:-250px;
animation-duration:26s;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-100px)}
100%{transform:translateY(0)}
}

/* HOME */

#home{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.start-btn{
font-size:22px;
padding:18px 50px;
background:#5865f2;
border:none;
border-radius:14px;
color:white;
cursor:pointer;
}

.top-controls{
position:absolute;
top:15px;
right:15px;
}

/* CHAT */

#chat{
display:none;
flex-direction:column;
height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:#111214;
border-bottom:1px solid #2a2f3a;
}

.logo{
font-size:18px;
font-weight:bold;
color:#57f287;
}

button{
background:#5865f2;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

/* チャット */

#chat-box{
flex:1;
overflow:auto;
padding:15px;
padding-bottom:130px;
display:flex;
flex-direction:column;
gap:12px;
}

.msg{
display:flex;
gap:10px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
}

.bubble{
background:#1e2230;
padding:10px;
border-radius:10px;
max-width:70%;
}

.name{
font-size:12px;
color:#aaa;
margin-bottom:3px;
}

.file{
color:#57a6ff;
display:block;
margin-top:5px;
}

/* 入力エリア */

#input-area{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
flex-direction:column;
gap:8px;
padding:10px;
background:#111214;
z-index:9999;
padding-bottom:calc(10px + env(safe-area-inset-bottom));
}

#msg-input{
width:100%;
padding:12px;
border-radius:20px;
border:none;
background:#1e2230;
color:white;
font-size:16px;
}

.bottom-buttons{
display:flex;
gap:8px;
width:100%;
}

#file{
flex:1;
color:white;
background:#1e2230;
padding:8px;
border-radius:8px;
}

#send-btn{
flex:1;
background:#57f287;
color:black;
font-weight:bold;
padding:10px;
}

@media (min-width:900px){

#input-area{
flex-direction:row;
align-items:center;
}

#msg-input{
flex:1;
}

.bottom-buttons{
width:auto;
}

#file{
flex:none;
}

#send-btn{
flex:none;
}

}

</style>
</head>

<body>

<div class="bg">
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>
</div>

<div id="home">

<div class="top-controls">
<button onclick="setTheme('day')">☀️</button>
<button onclick="setTheme('night')">🌙</button>
</div>

<button class="start-btn" onclick="startChat()">チャット開始</button>

</div>

<div id="chat">

<header>
<div class="logo">🍌 BANANEKO CHAT</div>

<div>
<button onclick="toggleUsers()">👥</button>
<button onclick="changeName()">名前</button>
<button onclick="changeIcon()">アイコン</button>
</div>
</header>

<div id="chat-box"></div>

<div id="user-list" style="display:none;position:fixed;right:10px;top:70px;background:#1e2230;padding:10px;border-radius:10px;">
<h4>オンライン</h4>
<div id="users"></div>
</div>

<div id="input-area">

<input id="msg-input" placeholder="メッセージ">

<div class="bottom-buttons">
<input type="file" id="file">
<button id="send-btn">送信</button>
</div>

</div>

</div>

<script type="module">

window.setTheme=(mode)=>{
if(mode==="day"){
document.body.classList.add("day")
}else{
document.body.classList.remove("day")
}
}

window.startChat=()=>{
home.style.display="none"
chat.style.display="flex"
}

/* Firebase */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push,
onChildAdded,
onValue,
set,
remove,
onDisconnect,
onChildRemoved
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
getStorage,
ref as sRef,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig={
apiKey:"AIzaSyBRE5BJBF-fOMJKq3yIq9IQkCFcQUYL900",
authDomain:"my-safe-chat-c814f.firebaseapp.com",
databaseURL:"https://my-safe-chat-c814f-default-rtdb.firebaseio.com",
projectId:"my-safe-chat-c814f",
storageBucket:"my-safe-chat-c814f.appspot.com",
messagingSenderId:"126454688177",
appId:"1:126454688177:web:24b9bba7d71b759f38819"
};

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)
const storage=getStorage(app)

/* ユーザー */

let username=localStorage.getItem("chatName")

if(!username){
username=prompt("名前")||"名無し"
localStorage.setItem("chatName",username)
}

let icon=localStorage.getItem("chatIcon")||"https://cdn-icons-png.flaticon.com/512/149/149071.png"

/* 名前変更 */

window.changeName=()=>{
let n=prompt("新しい名前",username)
if(n){
username=n
localStorage.setItem("chatName",n)
}
}

/* アイコン変更 */

window.changeIcon=async()=>{

let type=prompt("1:URL 2:端末")

if(type==="1"){
let url=prompt("URL")
if(url){
icon=url
localStorage.setItem("chatIcon",url)
}
}

if(type==="2"){
let input=document.createElement("input")
input.type="file"

input.onchange=async e=>{
let file=e.target.files[0]

let fileRef=sRef(storage,"icons/"+Date.now())

await uploadBytes(fileRef,file)

icon=await getDownloadURL(fileRef)

localStorage.setItem("chatIcon",icon)
}

input.click()
}

}

/* Enter送信 */

document.getElementById("msg-input").addEventListener("keypress",(e)=>{
if(e.key==="Enter"){
sendMessage()
}
})

document.getElementById("send-btn").onclick=sendMessage

async function sendMessage(){

const msgInput=document.getElementById("msg-input")
const fileInput=document.getElementById("file")

const text=msgInput.value.trim()
const file=fileInput.files[0]

if(!text&&!file)return

let fileUrl=null
let fileName=null

if(file){

fileName=file.name

const fileRef=sRef(storage,"files/"+Date.now()+"_"+fileName)

await uploadBytes(fileRef,file)

fileUrl=await getDownloadURL(fileRef)

}

push(ref(db,"messages"),{
name:username,
icon:icon,
text:text,
file:fileUrl,
fileName:fileName
})

msgInput.value=""
fileInput.value=""

}

/* メッセージ表示 */

const chat=document.getElementById("chat-box")

onChildAdded(ref(db,"messages"),(snap)=>{

const data=snap.val()

requestAnimationFrame(()=>{

const fragment=document.createDocumentFragment()

const msg=document.createElement("div")
msg.className="msg"

msg.innerHTML=`
<img class="avatar" src="${data.icon}">
<div class="bubble">
<div class="name">${data.name}</div>
${data.text||""}
</div>
`

fragment.appendChild(msg)

chat.appendChild(fragment)

chat.scrollTo({
top:chat.scrollHeight,
behavior:"smooth"
})

})

})

chat.appendChild(msg)

chat.scrollTop=chat.scrollHeight

})

/* オンライン */

const userId=Math.random().toString(36)

const userRef=ref(db,"online/"+userId)

set(userRef,{
name:username,
icon:icon
})

onDisconnect(userRef).remove()

/* オンライン一覧 */

onValue(ref(db,"online"),snap=>{

const users=document.getElementById("users")
users.innerHTML=""

snap.forEach(c=>{
let u=c.val()
let div=document.createElement("div")
div.textContent=u.name
users.appendChild(div)
})

})

/* 参加通知 */

onChildAdded(ref(db,"online"),snap=>{

let u=snap.val()

push(ref(db,"messages"),{
name:"SYSTEM",
icon:"https://cdn-icons-png.flaticon.com/512/1827/1827370.png",
text:u.name+"さんいらっしゃい！"
})

})

/* 退出通知 */

onChildRemoved(ref(db,"online"),snap=>{

let u=snap.val()

push(ref(db,"messages"),{
name:"SYSTEM",
icon:"https://cdn-icons-png.flaticon.com/512/1827/1827370.png",
text:u.name+"さんが退出しました"
})

})

/* オンラインボタン */

window.toggleUsers=()=>{
const box=document.getElementById("user-list")
box.style.display=box.style.display==="none"?"block":"none"
}

</script>

</body>
</html>
