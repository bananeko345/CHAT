<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安心・安全チャット</title>
    <style>
        body { font-family: sans-serif; background: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: white; padding: 10px 15px; border-radius: 15px; max-width: 80%; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        #input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; }
        button { background: #128c7e; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 1.2em; }
    </style>
</head>
<body>
    <header>🌎 安全なオンラインチャット</header>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="メッセージを入力..." autocomplete="off">
        <button id="send-btn">➤</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com";
    import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com";

    // 【修正済み】画像の情報に、抜けていたdatabaseURLを追加しました
    const firebaseConfig = {
        apiKey: "AIzaSyBRE5BJBF-fOMJKq3yIq9IQkCFcQUYL900",
        authDomain: "my-safe-chat-c814f.firebaseapp.com",
        databaseURL: "https://my-safe-chat-c814f-default-rtdb.firebaseio.com", // ← これが抜けていたので足しました！
        projectId: "my-safe-chat-c814f",
        storageBucket: "my-safe-chat-c814f.firebasestorage.app",
        messagingSenderId: "126454688177",
        appId: "1:126454688177:web:24b9bba7d71b759f38819",
        measurementId: "G-KX7EWZ6KC6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const chatRef = ref(db, "messages");

    function sendMessage() {
        const input = document.getElementById("msg-input");
        const text = input.value.trim();
        if (!text) return;

        // Firebaseへ送信
        push(chatRef, {
            text: text,
            createdAt: serverTimestamp()
        }).then(() => {
            input.value = ""; // 成功したら空にする
        }).catch((e) => {
            alert("エラー！Firebaseの『ルール』画面で『公開』ボタンを押したか確認してください！");
        });
    }

    document.getElementById("send-btn").onclick = sendMessage;
    document.getElementById("msg-input").onkeypress = (e) => { if (e.key === "Enter") sendMessage(); };

    onChildAdded(chatRef, (snapshot) => {
        const data = snapshot.val();
        const div = document.createElement("div");
        div.className = "msg";
        div.textContent = data.text;
        document.getElementById("chat-box").appendChild(div);
        document.getElementById("chat-box").scrollTop = document.getElementById("chat-box").scrollHeight;
    });
</script>
</body>
</html>
